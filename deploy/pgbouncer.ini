[databases]
; Replace with your actual PostgreSQL database name and credentials
examforge = host=127.0.0.1 port=5432 dbname=examforge

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction mode: server connections are released between transactions.
; This allows 5000 client connections to multiplex over a small PostgreSQL pool.
pool_mode = transaction

; Max client connections from Next.js workers (PM2 cluster × Prisma pool)
max_client_conn = 1000

; Server-side connections to PostgreSQL per database/user pair.
; 16 PM2 workers × 5 Prisma connections = 80 max; set headroom above that.
default_pool_size = 100

; Reserve pool handles sudden spikes — kicks in when default_pool is full
reserve_pool_size = 20
reserve_pool_timeout = 3

; Drop idle server connections after 30s to keep PostgreSQL load low
server_idle_timeout = 30

; Kill server connections that are idle for more than 10 minutes
server_lifetime = 600

; Client timeout: if a client waits more than 10s for a connection, return error
query_wait_timeout = 10

; Required for transaction mode compatibility — prevents prepared-statement issues
ignore_startup_parameters = extra_float_digits,options

; Logging (set to 0 in production to reduce I/O)
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; PID file
pidfile = /var/run/pgbouncer/pgbouncer.pid
